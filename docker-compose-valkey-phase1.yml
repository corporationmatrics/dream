version: '3.9'

services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: erp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: erp
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./erp-database/migrations:/docker-entrypoint-initdb.d
    networks:
      - erp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Keycloak (OAuth2) ====================
  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    container_name: erp-keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin123
      KC_DB: postgres
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_POOL_INITIAL_SIZE: "10"
      KC_DB_POOL_MAX_SIZE: "20"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HOSTNAME: localhost
      KC_FEATURES: "scripts,token-exchange,dynamic-scopes"
    command: ["start"]
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ==================== Valkey 8.0 (Cache + Auction Engine) ====================
  valkey:
    image: valkey/valkey:8.0-alpine
    container_name: erp-valkey
    command: valkey-server --maxmemory 1gb --maxmemory-policy allkeys-lru --save 60 1000 --appendonly yes
    environment:
      VALKEY_MAXMEMORY: 1gb
      VALKEY_MAXMEMORY_POLICY: allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
      - valkey_aof:/data/aof
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Valkey Sentinel (High Availability) ====================
  valkey-sentinel-1:
    image: valkey/valkey:8.0-alpine
    container_name: erp-valkey-sentinel-1
    command: valkey-sentinel /etc/valkey/sentinel.conf
    environment:
      SENTINEL_PORT: 26379
    ports:
      - "26379:26379"
    volumes:
      - ./infrastructure/valkey/sentinel.conf:/etc/valkey/sentinel.conf
      - valkey_sentinel_1:/data
    depends_on:
      - valkey
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "valkey-cli", "-p", "26379", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Meilisearch (Full-Text Search) ====================
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: erp-meilisearch
    environment:
      MEILI_MASTER_KEY: changeme-123456789
      MEILI_NO_ANALYTICS: "true"
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== MinIO (S3-Compatible Object Storage) ====================
  minio:
    image: minio/minio:latest
    container_name: erp-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio/data
    command: server /minio/data --console-address ":9001"
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Prometheus (Metrics) ====================
  prometheus:
    image: prom/prometheus:latest
    container_name: erp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Grafana (Dashboards) ====================
  grafana:
    image: grafana/grafana:latest
    container_name: erp-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
      GF_INSTALL_PLUGINS: "redis-datasource"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==================== Apache APISIX (API Gateway) ====================
  apisix:
    image: apache/apisix:3.3-alpine
    container_name: erp-apisix
    environment:
      APISIX_STAND_ALONE: "false"
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9092:9092"
    volumes:
      - ./infrastructure/apisix/config.yaml:/usr/local/apisix/conf/config.yaml
      - ./infrastructure/apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml
    depends_on:
      - valkey
    networks:
      - erp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/apisix/admin/version"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  valkey_aof:
    driver: local
  valkey_sentinel_1:
    driver: local
  meilisearch_data:
    driver: local
  minio_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  erp-network:
    driver: bridge

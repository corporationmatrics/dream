apiVersion: v1
kind: Secret
metadata:
  name: accounting-secrets
  namespace: dream-erp
type: Opaque
stringData:
  datasource-url: jdbc:postgresql://postgres:5432/dream_erp
  datasource-password: PASSWORD_HERE

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounting
  namespace: dream-erp
  labels:
    app: accounting
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: accounting
  template:
    metadata:
      labels:
        app: accounting
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - accounting
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: ghcr-secret
      serviceAccountName: accounting
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: accounting
          image: ghcr.io/dream-erp/accounting:main
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: JAVA_OPTS
              value: "-Dspring.profiles.active=production -Xms256m -Xmx512m"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: accounting-secrets
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              value: "postgres"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: accounting-secrets
                  key: datasource-password
            - name: LOGGING_LEVEL_ROOT
              value: "INFO"
            - name: MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE
              value: "health,info,metrics,prometheus"
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 30
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: accounting
  namespace: dream-erp
  labels:
    app: accounting
spec:
  type: LoadBalancer
  selector:
    app: accounting
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: accounting
  namespace: dream-erp

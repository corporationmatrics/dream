# PostgreSQL Helm chart values for staging environment
global:
  postgresql:
    auth:
      username: postgres
      password: staging-db-password
      database: dream_erp

primary:
  enabled: true
  persistence:
    enabled: true
    storageClass: "local-path"
    size: 10Gi

  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  initdb:
    scripts:
      init.sql: |
        CREATE SCHEMA IF NOT EXISTS b2b;
        GRANT ALL PRIVILEGES ON SCHEMA b2b TO postgres;

readReplicas:
  enabled: false
  replicaCount: 0

metrics:
  enabled: true
  serviceMonitor:
    enabled: false

backup:
  enabled: false

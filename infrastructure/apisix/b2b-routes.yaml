-- APISIX Configuration: B2B API Gateway Routing
-- version: 1.0
-- date: 2026-02-07

apisix:
  admin:
    admin_key:
      - name: admin
        key: edd1c9f034335f136f87ad84b625c8f1
        role: admin
  
  node:
    listen:
      - 0.0.0.0:9080
      - 0.0.0.0:9443
    
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30
    resync_delay: 5
    health_check_timeout: 30

---
# ==================== B2B Purchase Orders Route ====================

http_routes:

  - id: b2b-po-intake
    uri: /api/b2b/purchase-orders
    methods:
      - POST
    upstream:
      type: roundrobin
      nodes:
        "nestjs-api:3000": 1
    plugins:
      - name: jwt-auth
        enable: true
        config:
          header: "Authorization"
          query: ""
          cookie: ""
          claim_checks_skip: 0
          audience: "dream-erp"
          
      - name: rate-limit
        enable: true
        config:
          rate: 100
          burst: 200
          default_vonig_window: 60
          key_type: "var"
          key: "http_x_user_id"
          rejected_code: 429

      - name: request-validation
        enable: true
        config:
          body_schema:
            type: object
            required: ["message_type", "sender", "po_header", "po_lines"]
            properties:
              message_type:
                type: string
                enum: ["purchase_order"]
              sender:
                type: object
                required: ["party_id", "party_name"]
              po_header:
                type: object
                required: ["po_number", "po_date"]

      - name: cors
        enable: true
        config:
          allow_origins: "*"
          allow_methods: "POST, GET, OPTIONS"
          allow_headers: "Content-Type, Authorization"
          expose_headers: "X-Message-ID"
          max_age: 3600

      - name: proxy-rewrite
        enable: true
        config:
          uri: "/b2b/purchase-orders"
          headers:
            add:
              X-Forwarded-By: "APISIX"
              X-Request-ID: "$request_id"

  # ==================== B2B PO Status Tracking ====================
  
  - id: b2b-po-status
    uri: /api/b2b/purchase-orders/*
    methods:
      - GET
    upstream:
      type: roundrobin
      nodes:
        "nestjs-api:3000": 1
    plugins:
      - name: jwt-auth
        enable: true
        config:
          header: "Authorization"

      - name: rate-limit
        enable: true
        config:
          rate: 500
          burst: 1000
          key_type: "var"
          key: "http_x_user_id"

      - name: cache
        enable: true
        config:
          cache_ttl: 300  # 5 minutes
          cache_key:
            - $uri
            - $arg_partner_id
          cache_bypass:
            - $http_cache_bypass

      - name: proxy-rewrite
        enable: true
        config:
          uri: "/b2b/purchase-orders$uri"

  # ==================== B2B Invoices ====================

  - id: b2b-invoices-list
    uri: /api/b2b/invoices
    methods:
      - GET
    upstream:
      type: roundrobin
      nodes:
        "nestjs-api:3000": 1
    plugins:
      - name: jwt-auth
        enable: true
        config:
          header: "Authorization"

      - name: rate-limit
        enable: true
        config:
          rate: 100
          burst: 200
          key_type: "var"
          key: "http_x_user_id"

      - name: cache
        enable: true
        config:
          cache_ttl: 60

  # ==================== Spring Boot Ledger Posting ====================

  - id: accounting-ledger-post
    uri: /api/accounting/invoices/post-from-edi
    methods:
      - POST
    upstream:
      type: roundrobin
      nodes:
        "spring-boot-accounting:8080": 1
    plugins:
      - name: jwt-auth
        enable: true
        config:
          header: "Authorization"

      - name: rate-limit
        enable: true
        config:
          rate: 50  # Lower rate for critical accounting operations
          burst: 100
          key_type: "var"
          key: "http_x_user_id"

      - name: request-validation
        enable: true
        config:
          body_schema:
            type: object
            required: ["invoice_number", "vendor_gstin", "invoice_total"]

      - name: proxy-rewrite
        enable: true
        config:
          uri: "/invoices/post-from-edi"

---
# ==================== Global Plugins ====================

plugins:
  - name: gzip
    enable: true
    config:
      min_length: 1024
      comp_level: 6
      types:
        - text/plain
        - application/json
        - application/javascript

  - name: log-format
    enable: true
    config:
      format: >
        {
          "timestamp": "$time_iso8601",
          "remote_addr": "$remote_addr",
          "request_id": "$request_id",
          "method": "$request_method",
          "uri": "$uri",
          "status": $status,
          "response_time": $request_time,
          "upstream": "$upstream_addr",
          "user_agent": "$http_user_agent"
        }

---
# ==================== Security Settings ====================

# SSL/TLS Configuration
ssl:
  enable: true
  listen:
    - port: 9443
      ssl_protocols: "TLSv1.2 TLSv1.3"
      ssl_ciphers: "ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384"
      ssl_prefer_server_ciphers: "on"

# Security Headers
default_headers:
  - name: "X-Content-Type-Options"
    value: "nosniff"
  - name: "X-Frame-Options"
    value: "DENY"
  - name: "Strict-Transport-Security"
    value: "max-age=31536000; includeSubDomains"
  - name: "Content-Security-Policy"
    value: "default-src 'self'"

---
# ==================== Prometheus Metrics ====================

prometheus:
  enable: true
  listen:
    0.0.0.0:9091
  metrics:
    - http_requests_total
    - http_request_duration_seconds
    - apisix_upstream_latency
    - apisix_node_info

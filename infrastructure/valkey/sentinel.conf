# Valkey Sentinel Configuration
# Provides high availability for Valkey with automatic failover
# Port: 26379

port 26379
bind 0.0.0.0

# Valkey Sentinel monitoring master instance
# Format: sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor valkey-master 127.0.0.1 6379 1

# Master authentication (if Valkey master requires password)
# sentinel auth-pass <master-name> <password>
# sentinel auth-pass valkey-master yourpassword

# Timeout for slave to respond to ping (milliseconds)
sentinel down-after-milliseconds valkey-master 5000

# Timeout for failover process (milliseconds)
sentinel failover-timeout valkey-master 10000

# Number of slaves to reconfigure in parallel during failover
sentinel parallel-syncs valkey-master 1

# Log file
logfile "/var/log/valkey/sentinel.log"

# PID file
pidfile "/var/run/valkey-sentinel.pid"

# Working directory
dir /data

# Generate-syncs configuration
# How many replicas can be resynced after a failover in parallel
sentinel parallel-syncs valkey-master 1

# Notification scripts (optional)
# Script to execute when master is down
# sentinel notification-script <master-name> /path/to/notification.sh

# Script to execute when transition to slave
# sentinel client-reconfig-script <master-name> /path/to/reconfig.sh

# ==================== Monitoring & Metrics ====================
# Enable metrics export for Prometheus
sentinel announce-ip 127.0.0.1
sentinel announce-port 26379

# ==================== Sentinel-to-Sentinel Discovery ====================
# Let other sentinels auto-discover this one
sentinel allow-empty-password no

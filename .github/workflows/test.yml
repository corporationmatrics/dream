name: Tests - B2B Integration

on:
  push:
    branches: [ main, develop, feature/* ]
    paths:
      - 'erp-api/**'
      - 'erp-database/**'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'erp-api/**'
      - 'erp-database/**'

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: dream_erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: valkey:8.0-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'erp-api/package-lock.json'

      - name: Install dependencies
        working-directory: ./erp-api
        run: npm ci

      - name: Run database migrations (test)
        working-directory: ./erp-database
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/dream_erp_test
        run: |
          npm ci
          npm run migrate:test || true

      - name: Run linting
        working-directory: ./erp-api
        run: npm run lint -- --max-warnings 0
        continue-on-error: true

      - name: Run unit tests
        working-directory: ./erp-api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/dream_erp_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-do-not-use-in-production
        run: npm run test:unit -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./erp-api/coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-unit
          path: erp-api/coverage/
          retention-days: 7

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    needs: test-unit

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: dream_erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: valkey:8.0-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports:
          - 9000:9000
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'erp-api/package-lock.json'

      - name: Install dependencies
        working-directory: ./erp-api
        run: npm ci

      - name: Run database migrations (test)
        working-directory: ./erp-database
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/dream_erp_test
        run: |
          npm ci
          npm run migrate:test || true

      - name: Run integration tests
        working-directory: ./erp-api
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/dream_erp_test
          REDIS_URL: redis://localhost:6379
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          JWT_SECRET: test-secret-key-do-not-use-in-production
        run: npm run test:e2e -- --runInBand --forceExit

      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-integration
          path: erp-api/test-results/
          retention-days: 7

  test-database:
    name: Database Schema Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: dream_erp_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Verify database connectivity
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d dream_erp_test -c "SELECT 1;"

      - name: Run B2B schema migration
        working-directory: ./erp-database/migrations
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d dream_erp_test -f 003_b2b_edi_schema.sql
          echo "✓ B2B schema created successfully"

      - name: Verify B2B tables
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d dream_erp_test -c "\dt" | grep b2b_
          echo "✓ All B2B tables verified"

      - name: Verify B2B indexes
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d dream_erp_test -c "\di" | grep idx_b2b_
          echo "✓ All B2B indexes verified"

      - name: Verify B2B triggers
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U test_user -d dream_erp_test -c "SELECT trigger_name FROM information_schema.triggers WHERE trigger_schema='public' AND trigger_name LIKE 'b2b_%' OR trigger_name LIKE '%_b2b_%';"
          echo "✓ All B2B triggers verified"

  test-security:
    name: Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit
        working-directory: ./erp-api
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Run Snyk scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        continue-on-error: true

  test-summary:
    name: Test Summary
    runs-on: ubuntu-24.04
    if: always()
    needs: [ test-unit, test-integration, test-database, test-security ]

    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.test-unit.result }}" != "success" ]; then
            echo "❌ Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.test-integration.result }}" != "success" ]; then
            echo "❌ Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.test-database.result }}" != "success" ]; then
            echo "❌ Database tests failed"
            exit 1
          fi
          echo "✅ All tests passed"

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All tests passed!\n\n- Unit Tests: PASSED\n- Integration Tests: PASSED\n- Database Tests: PASSED\n- Security Scan: PASSED'
            })

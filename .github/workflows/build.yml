name: Build & Push - Docker Images

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'erp-api/**'
      - 'erp-accounting/**'
      - 'Dockerfile*'
      - '.dockerignore'
      - '.github/workflows/build.yml'
    tags:
      - 'v*.*.*'
  workflow_run:
    workflows: [ "Tests - B2B Integration" ]
    types: [ completed ]
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_API: dream-erp/api
  IMAGE_NAME_ACCOUNTING: dream-erp/accounting

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-api:
    name: Build NestJS API Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' || (github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./erp-api
          file: ./erp-api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image pushed
        run: |
          echo "✓ NestJS API image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}"

  build-accounting:
    name: Build Spring Boot Accounting Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    timeout-minutes: 30
    if: ${{ github.event_name == 'push' || (github.event.workflow_run.conclusion == 'success') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ACCOUNTING }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Accounting image
        uses: docker/build-push-action@v5
        with:
          context: ./erp-accounting
          file: ./erp-accounting/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image pushed
        run: |
          echo "✓ Spring Boot Accounting image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ACCOUNTING }}"

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-24.04
    needs: [ build-api, build-accounting ]
    permissions:
      contents: read
      packages: read
    timeout-minutes: 15
    if: ${{ github.event_name == 'push' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy scan on API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Run Trivy scan on Accounting image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ACCOUNTING }}:${{ github.ref_name }}
          format: 'sarif'
          output: 'trivy-accounting.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-*.sarif'
        continue-on-error: true

  notify:
    name: Notify Build Status
    runs-on: ubuntu-24.04
    needs: [ build-api, build-accounting ]
    if: always()

    steps:
      - name: Build succeeded
        if: ${{ needs.build-api.result == 'success' && needs.build-accounting.result == 'success' }}
        run: |
          echo "✅ All images built and pushed successfully"
          echo "API: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_API }}:${{ github.ref_name }}"
          echo "Accounting: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_ACCOUNTING }}:${{ github.ref_name }}"

      - name: Build failed
        if: ${{ needs.build-api.result != 'success' || needs.build-accounting.result != 'success' }}
        run: |
          echo "❌ Build failed"
          exit 1
